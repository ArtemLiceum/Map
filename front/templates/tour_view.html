<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Виртуальный тур</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/tour_view.css' %}">
</head>
<body class="tv-body">
<div id="tvRoot" class="tv-root">
    <div class="tv-panorama" id="tvPanorama" aria-label="Панорама">
        <div class="tv-panorama-image" id="tvPanoramaImage"></div>
        <div class="tv-nav-markers" id="tvNavMarkers"></div>
        <div class="tv-fade" id="tvFade"></div>
        <div class="tv-loader" id="tvLoader">Загрузка...</div>
    </div>

    <div class="tv-minimap-stack" id="tvMinimapStack">
        <div
            class="tv-route-panel hidden"
            id="tvRoutePanel"
            role="dialog"
            aria-modal="false"
            aria-labelledby="tvRoutePanelTitle"
        >
        <div class="tv-route-panel-header">
            <div class="tv-route-panel-title" id="tvRoutePanelTitle">Маршрут</div>
            <button
                type="button"
                class="tv-route-panel-close"
                id="tvRoutePanelClose"
                aria-label="Свернуть панель маршрута"
                title="Свернуть"
            >×</button>
        </div>
        <div class="tv-route-row">
            <label for="tvRouteStart">Старт</label>
            <select id="tvRouteStart"></select>
        </div>
        <div class="tv-route-row">
            <label for="tvRouteEnd">Финиш</label>
            <select id="tvRouteEnd"></select>
        </div>
        <div class="tv-route-actions">
            <button type="button" class="tv-route-primary" id="tvRouteBuild">Построить</button>
            <button type="button" class="tv-route-secondary" id="tvRouteClear">Сбросить</button>
        </div>
        <div id="tvRouteStatus" class="tv-route-status" role="status" aria-live="polite"></div>
        </div>

        <div class="tv-minimap" id="tvMinimap">
        <div class="tv-minimap-zoom" id="tvMinimapZoom" role="group" aria-label="Масштаб миникарты">
            <button class="tv-minimap-zoom-btn" id="tvMinimapZoomOut" type="button" aria-label="Уменьшить масштаб миникарты" title="Уменьшить">−</button>
            <button class="tv-minimap-zoom-btn" id="tvMinimapZoomIn" type="button" aria-label="Увеличить масштаб миникарты" title="Увеличить">+</button>
        </div>
        <button class="tv-minimap-toggle" id="tvMinimapToggle" type="button" aria-expanded="true" aria-label="Свернуть мини-карту">
            −
        </button>
        <div class="tv-minimap-body" id="tvMinimapBody">
            <img id="tvMinimapImage" alt="План" class="tv-minimap-img">
            <svg
                class="tv-minimap-route"
                id="tvMinimapRoute"
                viewBox="0 0 100 100"
                preserveAspectRatio="none"
                aria-hidden="true"
            ></svg>
            <div class="tv-minimap-points" id="tvMinimapPoints"></div>
        </div>
        </div>

        <button
            type="button"
            class="tv-route-panel-toggle"
            id="tvRoutePanelToggle"
            aria-expanded="false"
            aria-controls="tvRoutePanel"
            title="Открыть или закрыть панель маршрута"
        >
            Маршрут
        </button>
    </div>

    <button class="tv-back" id="tvBack" type="button" onclick="history.back()">← Назад</button>

    <div id="tvRouteDeviation" class="tv-route-deviation hidden" role="alert">
        <p id="tvRouteDeviationText" class="tv-route-deviation-text"></p>
        <div class="tv-route-deviation-actions">
            <button type="button" class="tv-route-primary" id="tvRouteRecalc">Пересчитать отсюда</button>
            <button type="button" class="tv-route-secondary" id="tvRouteCancelRoute">Отменить маршрут</button>
        </div>
        <p id="tvRouteRecalcHint" class="tv-route-recalc-hint hidden" role="status"></p>
    </div>

    <div id="tvRouteArrived" class="tv-route-arrived hidden" role="status" aria-live="polite">Вы прибыли</div>
    <div id="tvRouteToast" class="tv-route-toast hidden" role="status" aria-live="polite"></div>
    {% if is_auth %}
    <div class="tv-toolbar">
        <label class="tv-tour-select">
            Тур:
            <select id="tvTourSelect"></select>
        </label>
        <div id="tvTourProgress" class="tv-tour-progress hidden" aria-live="polite">
            <div id="tvTourProgressTitle" class="tv-tour-progress-title"></div>
            <div class="tv-tour-progress-row">
                <span id="tvTourProgressText">Прогресс: 0%</span>
            </div>
            <div class="tv-tour-progress-bar">
                <div id="tvTourProgressBarFill" class="tv-tour-progress-bar-fill"></div>
            </div>
        </div>
    </div>
    {% endif %}

    <div class="tv-info-overlay" id="tvInfoOverlay">
        <div class="tv-info-card">
            <button class="tv-info-close" id="tvInfoClose" type="button" aria-label="Закрыть">×</button>
            <h4 id="tvInfoTitle"></h4>
            <p id="tvInfoText"></p>
        </div>
    </div>
</div>

<script>
    window.TOUR_PLAN_ID = Number('{{ plan_id }}');
    window.IS_AUTH = {{ is_auth|yesno:"true,false" }};
    window.IS_STAFF = {{ is_staff|yesno:"true,false" }};
</script>
<script src="{% static 'js/tour_viewer.js' %}"></script>
</body>
</html>
