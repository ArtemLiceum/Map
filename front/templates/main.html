{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1" style="background-image:none;"></div>
        <div class="col-10 col-sm-10 col-md-10 col-lg-10 col-xl-10" style="background-color: #ffffff; border-radius: 15px; box-shadow: 0 0 3px rgba(0,0,0,0.5);">
            <div style="height: 20px;"></div>
            <div class="container">
                <div class="row">
                    <!-- <div class="col-12 col-lg-6">
                        <h5 style="color: #363636; line-height: 1.5;">
                            Мы рады приветствовать Вас на нашем виртуальном туре по факультету физики, математики и информатики Курского государственного университета. Независимо от того, являетесь ли Вы будущим студентом, родителем или просто интересующимся, здесь Вы сможете, не выходя из дома, познакомиться с аудиториями, лабораториями и учебными помещениями этих направлений.
                        </h5>
                        <p class="text-muted mb-0">
                            Погрузитесь в атмосферу факультета и узнайте об уникальных особенностях каждой локации.
                        </p>
                    </div> -->
                    <div class="col-12 col-lg-6">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="mb-0">Доступные туры</h5>
                            <span id="toursStatus" class="text-muted small">Загрузка...</span>
                        </div>
                        <div class="tours-grid" id="toursContainer">
                            {% for plan in plans %}
                                <div class="tour-card-item">
                                    <a class="card h-100 shadow-sm tour-card text-decoration-none" href="{% url 'tour_view' plan.id %}">
                                        {% if plan.image %}
                                            <img src="{{ plan.image.url }}" alt="{{ plan.title }}" class="card-img-top">
                                        {% else %}
                                            <div class="card-img-top bg-light d-flex align-items-center justify-content-center text-muted">
                                                Нет изображения
                                            </div>
                                        {% endif %}
                                        <div class="card-body">
                                            <h6 class="card-title mb-1 text-dark">{{ plan.title }}</h6>
                                        </div>
                                    </a>
                                </div>
                            {% empty %}
                                <div class="tours-empty text-muted small">Туры пока не добавлены.</div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
            <div style="height: 20px;"></div>
        </div>
        <div class="col-1" style="background-image:none;"></div>
    </div>
</div>
<script src="{% static 'js/main.js' %}"></script>
{% endblock %}
