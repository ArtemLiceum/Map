{% extends "base.html" %}
{% load static %}

{% block title %}Виртуальные туры{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<style>
.evac-card {
    position: relative;
}
.evac-card .delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(255,0,0,0.85);
    border: none;
    border-radius: 6px;
    color: white;
    padding: 6px 8px;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: background 0.15s ease, transform 0.15s ease;
}
.evac-card .delete-btn:hover {
    background: rgba(255,0,0,1);
    transform: translateY(-1px);
}
.create-plan {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 8px;
    font-size: 16px;
}
</style>
{% endblock %}

{% block content %}
<h1>Виртуальные туры</h1>
<div class="tours-grid" id="plansContainer">
    {% if user.is_staff %}
        <div class="tour-card-item">
            <div class="card h-100 shadow-sm tour-card create-card" role="button" onclick="window.location.href='/admin/?new=1'">
                <div class="card-img-top bg-light d-flex align-items-center justify-content-center text-muted">
                    ➕ Создать новый план
                </div>
                <div class="card-body create-plan">
                    <div>Добавить новый</div>
                </div>
            </div>
        </div>
    {% endif %}
</div>

{{ user.is_staff|json_script:"is-admin" }}

<script>
const plansContainer = document.getElementById('plansContainer');
const IS_ADMIN = JSON.parse(document.getElementById('is-admin').textContent);

function getCookie(name) {
    const value = `; ${document.cookie || ''}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return null;
}

function apiFetch(url, options = {}) {
    const method = (options.method || 'GET').toUpperCase();
    const headers = new Headers(options.headers || {});
    const csrfSafe = ['GET', 'HEAD', 'OPTIONS', 'TRACE'].includes(method);

    if (!csrfSafe) {
        const token = getCookie('csrftoken');
        if (token) headers.set('X-CSRFToken', token);
    }

    return fetch(url, {
        credentials: 'same-origin',
        ...options,
        headers,
    });
}

async function fetchPlans() {
    try {
        const res = await apiFetch('/api/evac_plans/');
        if (!res.ok) throw new Error('Ошибка получения планов');
        const plans = await res.json();
        renderPlans(plans);
    } catch (e) {
        console.error(e);
        plansContainer.innerHTML += '<p>Не удалось загрузить планы.</p>';
    }
}

function renderPlans(plans) {
    if (!plans || !plans.length) return;
    plans.forEach(plan => {
        const wrapper = document.createElement('div');
        wrapper.className = 'tour-card-item';

        const card = document.createElement('div');
        card.className = 'card h-100 shadow-sm tour-card evac-card';
        card.setAttribute('role', 'button');

        const img = document.createElement('img');
        img.src = plan.image;
        img.alt = plan.title;
        img.className = 'card-img-top';
        card.appendChild(img);

        const body = document.createElement('div');
        body.className = 'card-body';
        const title = document.createElement('div');
        title.className = 'card-title';
        title.textContent = plan.title;
        body.appendChild(title);
        card.appendChild(body);

        if (IS_ADMIN) {
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.textContent = '🗑️';
            delBtn.addEventListener('click', async e => {
                e.stopPropagation();
                if (!confirm(`Удалить план "${plan.title}"?`)) return;
                try {
                    const res = await apiFetch(`/api/evac_plans/${plan.id}/`, { method: 'DELETE' });
                    if (res.status === 403) throw new Error('Нет прав или CSRF-токен отсутствует. Войдите как администратор.');
                    if (!res.ok) throw new Error('Ошибка удаления плана');
                    wrapper.remove();
                } catch (err) {
                    alert(err.message);
                }
            });
            card.appendChild(delBtn);
        }

        card.addEventListener('click', e => {
            if (e.target.classList.contains('delete-btn')) return;
            window.location.href = `/admin/?plan=${plan.id}`;
        });

        wrapper.appendChild(card);
        plansContainer.appendChild(wrapper);
    });
}

fetchPlans();
</script>
{% endblock %}
