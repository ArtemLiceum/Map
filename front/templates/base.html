<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Виртуальный тур{% endblock %}</title>
    <link rel="icon" href="{% static 'img/logo_brand.png' %}" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Подключаем Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Основные стили -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body style="margin:0;">

<!-- ===== Шапка ===== -->
<div class="container-fluid text-center py-3" style="background: linear-gradient(#0066a3, #009cbf);">
    <div class="row">
        <div class="col-12">
            <a class="navbar-brand" href="https://kursksu.ru/">
                <img src="{% static 'img/logo_brand.png' %}" alt="Logo" width="100" height="150" class="d-inline-block align-text-top">
            </a>
            <h3 style="color: white;">Виртуальный тур по территории</h3>
            <h5 style="color: white;">Курского государственного университета</h5>
        </div>
    </div>
</div>

<!-- ===== Навигация ===== -->
<div class="container-fluid text-center">
    <div class="row" style="background-color:#204d66; border-bottom-left-radius:10px; border-bottom-right-radius:10px;">
        <div class="col-12">
            <ul class="nav nav-pills mb-2 mx-5 mt-2">
                <li class="nav-item mx-1">
                    <a class="nav-link" href="{% url 'main' %}" style="color:#f2f6fd; background-color:#0083b2;">Главная</a>
                </li>
                <li class="nav-item mx-1">
                    <a class="nav-link" href="faq.html" style="color:#f2f6fd;">FAQ</a>
                </li>
                <li class="nav-item mx-1">
                    <a class="nav-link" href="{% url 'evac_plans' %}" style="color:#f2f6fd;">Редактор карт</a>
                </li>
            </ul>
        </div>
    </div>
</div>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
